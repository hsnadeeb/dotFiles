# ~/.tmux.conf
# Minimal, practical defaults.

# -----------------------------------------------------------------------------
# 01) General behavior
# -----------------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"
set -s escape-time 10
set -g focus-events on
set -g history-limit 50000
set -g mouse on
set -g set-clipboard on
set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1

# Keep panes/windows in the same working directory.
bind c new-window -c '#{pane_current_path}'
bind '"' split-window -v -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'

# ----------------------------------------------------------------------------- 
# ADDED: Easier pane splits (more ergonomic than % and ")
# -----------------------------------------------------------------------------
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Reload config quickly.
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# -----------------------------------------------------------------------------
# 02) Keybindings
# -----------------------------------------------------------------------------

# Use Ctrl-a as prefix (keeps Ctrl-b available via double tap behavior below).
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Vim-style pane movement.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes quickly.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -----------------------------------------------------------------------------
# ADDED: Smart pane switching between tmux and Neovim
# Allows Ctrl-h/j/k/l to move between tmux panes OR nvim splits seamlessly
# -----------------------------------------------------------------------------

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\S+\/)?(n?vim)$'"

bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# -----------------------------------------------------------------------------
# ADDED: Quick session management
# -----------------------------------------------------------------------------

# Session tree explorer (view sessions/windows/panes)
bind s choose-tree -Zs

# Create a new session quickly
bind C new-session

# -----------------------------------------------------------------------------
# 03) Copy mode (vi)
# -----------------------------------------------------------------------------

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# -----------------------------------------------------------------------------
# 04) Status line
# -----------------------------------------------------------------------------

set -g status-position bottom
set -g status-justify left
set -g status-interval 2
set -g status-left-length 40
set -g status-right-length 80

set -g status-style 'fg=colour250,bg=default'
set -g message-style 'fg=colour231,bg=colour31'

set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=colour114'

set -g status-left '#[fg=colour114]#S #[fg=colour240]| #[fg=colour108]#{pane_current_path}'
set -g status-right '#[fg=colour240]%Y-%m-%d #[fg=colour167]%H:%M'

setw -g window-status-format '#[fg=colour245]#I:#W'
setw -g window-status-current-format '#[fg=colour114]#I:#W'
setw -g window-status-activity-style 'fg=colour214'

# -----------------------------------------------------------------------------
# ADDED: Show pane info on borders (very useful when many panes exist)
# -----------------------------------------------------------------------------

set -g pane-border-status top
set -g pane-border-format " #{pane_index} #{pane_current_command} "

# -----------------------------------------------------------------------------
# ADDED: Better visual distinction for active pane
# -----------------------------------------------------------------------------

set -g pane-active-border-style fg=green
set -g pane-border-style fg=grey

# -----------------------------------------------------------------------------
# 05) Quality-of-life
# -----------------------------------------------------------------------------

# Start windows and panes at 1 and keep current window highlighted.
setw -g automatic-rename on
setw -g aggressive-resize on
