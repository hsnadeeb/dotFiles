# ~/.tmux.conf
# Minimal, practical defaults.

# -----------------------------------------------------------------------------
# 01) General behavior
# -----------------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"
set -s escape-time 10
set -g focus-events on
set -g history-limit 50000
set -g mouse on
set -g set-clipboard on
set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1

# Keep panes/windows in the same working directory.
bind c new-window -c '#{pane_current_path}'
bind '"' split-window -v -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'

# Reload config quickly.
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# -----------------------------------------------------------------------------
# 02) Keybindings
# -----------------------------------------------------------------------------

# Use Ctrl-a as prefix (keeps Ctrl-b available via double tap behavior below).
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Vim-style pane movement.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes quickly.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -----------------------------------------------------------------------------
# 03) Copy mode (vi)
# -----------------------------------------------------------------------------

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# -----------------------------------------------------------------------------
# 04) Status line
# -----------------------------------------------------------------------------

set -g status-position bottom
set -g status-justify left
set -g status-interval 2
set -g status-left-length 40
set -g status-right-length 80

set -g status-style 'fg=colour250,bg=default'
set -g message-style 'fg=colour231,bg=colour31'
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=colour114'

set -g status-left '#[fg=colour114]#S #[fg=colour240]| #[fg=colour108]#{pane_current_path}'
set -g status-right '#[fg=colour240]%Y-%m-%d #[fg=colour167]%H:%M'

setw -g window-status-format '#[fg=colour245]#I:#W'
setw -g window-status-current-format '#[fg=colour114]#I:#W'
setw -g window-status-activity-style 'fg=colour214'

# -----------------------------------------------------------------------------
# 05) Quality-of-life
# -----------------------------------------------------------------------------

# Start windows and panes at 1 and keep current window highlighted.
setw -g automatic-rename on
setw -g aggressive-resize on

